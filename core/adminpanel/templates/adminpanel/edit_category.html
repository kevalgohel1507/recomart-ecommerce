{% extends "adminpanel/base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= PAGE ================= */

.edit-wrapper{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
}

/* ================= CARD ================= */

.edit-card{
    width:540px;
    padding:45px;
    border-radius:24px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(18px);
    box-shadow:0 30px 60px rgba(0,0,0,.12);
    animation:cardEnter .6s ease;
}

/* ================= TITLE ================= */

.edit-card h3{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

/* ================= FLOATING INPUT ================= */

.field{
    position:relative;
    margin-bottom:22px;
}

.field input,
.field select{
    width:100%;
    padding:16px 14px;
    border-radius:14px;
    border:1px solid #e2e2e2;
    font-size:14px;
    background:white;
    transition:.35s;
}

/* animated border glow */
.field input:focus,
.field select:focus{
    outline:none;
    border-color:#20c997;
    box-shadow:
        0 0 0 3px rgba(32,201,151,.15),
        0 10px 25px rgba(32,201,151,.15);
    transform:translateY(-2px);
}

/* floating label */

.field label{
    position:absolute;
    left:14px;
    top:16px;
    color:#888;
    font-size:14px;
    pointer-events:none;
    transition:.25s;
    background:white;
    padding:0 6px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field select:focus + label{
    top:-9px;
    font-size:12px;
    color:#20c997;
}

/* ================= FILE INPUT ================= */

.file-input{
    border:2px dashed #20c997;
    padding:18px;
    border-radius:14px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.file-input:hover{
    background:rgba(32,201,151,.06);
}

/* ================= ADVANCED BUTTON ================= */

.update-btn{
    position:relative;
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    font-weight:600;
    font-size:15px;
    color:white;
    cursor:pointer;
    overflow:hidden;
    background:linear-gradient(135deg,#20c997,#0f9d58);
    transition:.35s;
}

/* shine animation */
.update-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.6),
        transparent
    );
    transform:skewX(-20deg);
}

.update-btn:hover::before{
    animation:shine .8s forwards;
}

.update-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(32,201,151,.35);
}

.update-btn:active{
    transform:scale(.97);
}

/* ================= ENERGY HEADER ================= */

.energy{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:conic-gradient(#20c997, #0f9d58, #20c997);
    animation:rotate 6s linear infinite;
    display:flex;
    align-items:center;
    justify-content:center;
}

.energy span{
    width:70px;
    height:70px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:#20c997;
    font-weight:bold;
}

/* ================= ANIMATIONS ================= */

@keyframes rotate{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

@keyframes shine{
    100%{left:150%;}
}

@keyframes cardEnter{
    from{
        opacity:0;
        transform:translateY(40px) scale(.96);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

</style>

<div class="edit-wrapper">

<div class="edit-card">

<div class="energy">
    <span>✎</span>
</div>

<h3>Edit Category</h3>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="field">
    <input name="name" value="{{ category.name }}" placeholder=" " required>
    <label>Category Name</label>
</div>

<div class="field">
<select name="parent">
<option value="">&#8212; No Parent (Top Level)</option>
{% for item in category_tree %}
{% if item.cat.id != category.id %}
<option value="{{ item.cat.id }}"
  {% if category.parent and category.parent.id == item.cat.id %}selected{% endif %}>
  {{ item.indent }} {{ item.cat.name }}
</option>
{% endif %}
{% endfor %}
</select>
<label>Parent Category</label>
</div>

<div class="file-input">
<input type="file" name="icon">
</div>

<button class="update-btn">
Update Category
</button>

</form>

</div>

</div>

{% endblock %}
