{% extends "base.html" %}
{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#f8fafc,#eef2f7);
    font-family:'Inter',sans-serif;
}

/* ================= WRAPPER ================= */
.profile-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
    min-height:90vh;
    position:relative;
    overflow:hidden;
}

/* Soft floating background glow */
.bg-glow{
    position:absolute;
    width:350px;height:350px;
    border-radius:50%;
    background:radial-gradient(circle,#22c55e30,transparent 70%);
    top:-120px;left:-120px;
    animation:float 6s ease-in-out infinite;
}
.bg-glow2{
    position:absolute;
    width:350px;height:350px;
    border-radius:50%;
    background:radial-gradient(circle,#0ea5e930,transparent 70%);
    bottom:-120px;right:-120px;
    animation:float 8s ease-in-out infinite;
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
    100%{transform:translateY(0);}
}

/* ================= LOGIN CARD ================= */
.login-card{
    width:420px;
    background:white;
    padding:40px 35px;
    border-radius:22px;
    box-shadow:0 20px 60px rgba(0,0,0,.08);
    position:relative;
    z-index:2;
    text-align:center;
}

/* ================= ANIMATED SVG LOGO ================= */
.logo-wrapper{
    width:100px;height:100px;
    margin:0 auto 25px;
    position:relative;
    animation:floatLogo 3s ease-in-out infinite;
}
.logo-wrapper svg{width:100%;height:100%;}
.logo-wrapper path,.logo-wrapper circle{
    stroke:#111827;stroke-width:3;fill:none;
    stroke-dasharray:300;stroke-dashoffset:300;
    animation:draw 2.5s ease-in-out infinite;
}
@keyframes draw{
    0%{stroke-dashoffset:300;}
    50%{stroke-dashoffset:0;}
    100%{stroke-dashoffset:300;}
}
@keyframes floatLogo{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}

/* ================= INPUT GROUP WITH ICON ================= */
.input-group{position:relative;margin-bottom:14px;}
.input-group svg{
    position:absolute;left:14px;top:50%;
    transform:translateY(-50%);
    width:18px;height:18px;
    stroke:#64748b;pointer-events:none;
}
.input-group input{
    width:100%;
    padding:12px 14px 12px 44px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    outline:none;transition:.3s;font-size:14px;
}
.input-group input:focus{
    border-color:#22c55e;
    box-shadow:0 0 0 3px rgba(34,197,94,.15);
}

/* ================= BUTTON ================= */
.login-btn{
    width:100%;padding:12px;
    border-radius:14px;
    background:#111827;color:white;
    border:none;cursor:pointer;
    font-weight:600;transition:.3s;margin-top:8px;
}
.login-btn:hover{
    background:#22c55e;
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(34,197,94,.3);
}

/* ================= ERROR ================= */
.login-error{
    background:#fee2e2;color:#dc2626;
    padding:10px;border-radius:8px;
    font-size:13px;margin-bottom:12px;text-align:center;
}
</style>

<div class="profile-wrapper">

    <div class="bg-glow"></div>
    <div class="bg-glow2"></div>

    <div class="login-card">

        <!-- Animated SVG Logo -->
        <div class="logo-wrapper">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="30" r="18"/>
                <path d="M20 85 Q50 60 80 85"/>
            </svg>
        </div>

        <h2>Admin Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="login-error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% if error %}
            <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
                <svg fill="none" viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c2-4 14-4 16 0"/>
                </svg>
            </div>

            <!-- Password -->
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
                <svg fill="none" viewBox="0 0 24 24">
                    <rect x="5" y="10" width="14" height="10"/>
                    <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
                </svg>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

    </div>

</div>

{% endblock %}
