<tr>
<td>{{ cat.id }}</td>

<td>
{% for i in ""|center:level %}&nbsp;&nbsp;&nbsp;{% endfor %}
{{ cat.name }}
</td>

<td>{{ cat.slug }}</td>
<td>{{ cat.parent.name|default:"-" }}</td>

<td class="text-center">

<a href="{% url 'adminpanel:edit_category' cat.id %}"
class="btn btn-sm btn-edit action-btn me-2">
<i class="bi bi-pencil"></i>
</a>

<a href="{% url 'adminpanel:delete_category' cat.id %}"
onclick="return confirm('Delete this category?')"
class="btn btn-sm btn-delete action-btn">
<i class="bi bi-trash"></i>
</a>

</td>
</tr>

{% for child in cat.children.all %}
    {% include "adminpanel/category_row.html" with cat=child level=level|add:1 %}
{% endfor %}
