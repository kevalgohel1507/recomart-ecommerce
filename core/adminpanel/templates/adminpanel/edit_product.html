{% extends "adminpanel/base.html" %}
{% block content %}

<!-- Bootstrap CDN (only loads if not already in base.html) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<h2 class="page-title mb-4">Edit Product</h2>

<div class="d-flex justify-content-center">

<div class="card shadow-sm p-4 animate__animated animate__fadeIn w-100"
     style="max-width:750px;">


<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<!-- PRODUCT NAME -->
<div class="mb-3">
    <label class="form-label">Product Name</label>
    <input type="text" class="form-control" name="name" value="{{ product.name }}" required>
</div>

<!-- CATEGORY -->
<div class="mb-3">
    <label class="form-label">Category</label>
    <select name="category" class="form-select" required>
        {% for cat in categories %}
            <option value="{{ cat.id }}"
                {% if cat.id == product.category.id %}selected{% endif %}>
                {{ cat.name }}
            </option>
        {% endfor %}
    </select>
</div>

<!-- PRICE -->
<div class="mb-3">
    <label class="form-label">Price</label>
    <input type="number" class="form-control" name="price" value="{{ product.price }}" required>
</div>

<!-- STOCK -->
<div class="mb-3">
    <label class="form-label">Stock</label>
    <input type="number" class="form-control" name="stock" value="{{ product.stock }}" required>
</div>

<!-- DESCRIPTION -->
<div class="mb-3">
    <label class="form-label">Description</label>
    <textarea class="form-control" rows="4" name="description" required>{{ product.description }}</textarea>
</div>

<!-- CURRENT IMAGE -->
<div class="mb-3">
    <label class="form-label">Current Image</label><br>
    <img src="/media/{{ product.image.0 }}" width="150" class="rounded shadow-sm mb-2">
</div>

<!-- CHANGE IMAGE -->
<div class="mb-4">
    <label class="form-label">Change Image</label>
    <input type="file" class="form-control" name="images" multiple>
</div>

<!-- BUTTONS -->
<div class="d-flex gap-3">

    <button type="submit" class="btn btn-success px-4">
        💾 Update Product
    </button>

    <a href="{% url 'admin_product_detail' product.id %}" class="btn btn-secondary px-4">
        ❌ Cancel
    </a>

</div>

</form>

</div>

<!-- Animate.css -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

{% endblock %}
