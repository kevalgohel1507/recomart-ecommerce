{% extends 'base.html' %}
{% block content %}

<style>

.addr-wrapper{
max-width:900px;
margin:30px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.addr-header{
background:#2563eb;
color:white;
padding:12px 20px;
margin:-30px -30px 20px -30px;
font-weight:600;
}

.addr-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.addr-grid input,
.addr-grid textarea,
.addr-grid select{
padding:10px;
border:1px solid #ddd;
border-radius:5px;
width:100%;
}

.addr-grid textarea{
grid-column:1/3;
height:80px;
}

.addr-btn{
margin-top:20px;
background:#fb641b;
color:white;
padding:14px 50px;
border:none;
border-radius:5px;
font-weight:600;
cursor:pointer;
}

@media(max-width:640px){
  .addr-wrapper{margin:16px;padding:20px 16px;}
  .addr-header{margin:-20px -16px 16px;padding:12px 16px;}
  .addr-grid{grid-template-columns:1fr;}
  .addr-grid textarea{grid-column:1;}
  .addr-btn{width:100%;padding:13px;}
}

</style>

<div class="addr-wrapper">

<div class="addr-header">DELIVERY ADDRESS</div>

<form method="post">
{% csrf_token %}

<div class="addr-grid">

<input name="name" placeholder="Full Name" required>
<input name="phone" placeholder="Mobile Number" required>

<input name="pincode" placeholder="Pincode" maxlength="6" required>
<input name="locality" placeholder="Locality" required>

<textarea name="address" placeholder="Address (Area and Street)" required></textarea>

<input name="city" placeholder="City" required>

<select name="state">
<option>Gujarat</option>
<option>Maharashtra</option>
<option>Rajasthan</option>
<option>Delhi</option>
</select>

<input name="landmark" placeholder="Landmark (optional)">

</div>

<button class="addr-btn">CONTINUE</button>

</form>

</div>

{% endblock %}
