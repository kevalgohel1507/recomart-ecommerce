{% extends 'base.html' %}
{% block content %}

<style>

/* ================= PAGE ================= */

.page-wrapper {
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  font-family: 'Inter', sans-serif;
}

.page-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 25px;
  color: #0f172a;
}

/* ================= CARD ================= */

.table-card {
  background: white;
  padding: 32px;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,.06);
  margin-bottom: 24px;
  width: 100%;
  max-width: 520px;
}

.card-section-title {
  font-size: 14px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: .6px;
  text-transform: uppercase;
  margin: 0 0 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid #f1f5f9;
}

/* ================= FORM ================= */

.password-form p {
  margin-bottom: 18px;
}

.password-form label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 7px;
}

.password-form input {
  width: 100%;
  background: #f8fafc;
  border: 1.5px solid #e5e7eb;
  border-radius: 10px;
  padding: 11px 14px;
  color: #0f172a;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: .25s;
  box-sizing: border-box;
}

.password-form input:focus {
  border-color: #e8735a;
  box-shadow: 0 0 0 3px rgba(232,115,90,.12);
  background: #fff;
}

.password-form ul {
  list-style: none;
  padding: 0;
  font-size: 12px;
  color: #94a3b8;
  margin-top: 6px;
}
.password-form ul li::before {
  content: "• ";
  color: #cbd5e1;
}

/* ================= MESSAGES ================= */

.msg-error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #b91c1c;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  margin-bottom: 18px;
}
.msg-success {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  color: #15803d;
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  margin-bottom: 18px;
}

/* ================= BUTTON ================= */

.btn-save {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: #e8735a;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: .25s;
  margin-top: 6px;
}
.btn-save svg {
  width: 17px;
  height: 17px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}
.btn-save:hover {
  background: #d4624c;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(232,115,90,.35);
}

/* ================= BACK LINK ================= */

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  text-decoration: none;
  margin-top: 10px;
  transition: .2s;
}
.back-link svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}
.back-link:hover { color: #e8735a; }

/* ================= PROFILE TOP ================= */

.profile-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 640px) {
  .page-wrapper { padding: 16px; }
  .page-title { font-size: 22px; }
  .table-card { padding: 20px; }
}

</style>

<div class="page-wrapper">

  <div class="profile-top" style="width:100%;max-width:520px;">
    <h2 class="page-title" style="margin:0;">Change Password</h2>
  </div>

  <div class="table-card">
    <p class="card-section-title">
      <svg style="display:inline;vertical-align:middle;width:14px;height:14px;stroke:#64748b;fill:none;stroke-width:2;margin-right:6px;" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      Security Settings
    </p>

    {% if messages %}
      {% for message in messages %}
        <div class="{% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="password-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-save">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Update Password
      </button>
    </form>

    <a class="back-link" href="/accounts/profile/">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Profile
    </a>
  </div>

</div>

{% endblock %}
