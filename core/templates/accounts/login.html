{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
  body { background:#fff; }

  /* ── LAYOUT ── */
  .auth-wrap {
    display: flex;
    align-items: stretch;
    min-height: calc(100vh - 68px);
  }

  /* ── LEFT PANEL ── */
  .auth-left {
    flex: 0 0 420px;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 52px;
    background: #fff;
  }
  .auth-left-inner { width: 100%; }

  /* ── BRAND ── */
  .brand-name {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 28px;
    text-decoration: none;
  }
  .brand-icon { width: 34px; height: 34px; flex-shrink: 0; border-radius: 8px; }
  .brand-name span { font-size: 20px; font-weight: 700; color: #e8735a; letter-spacing: -.3px; }

  /* ── HEADINGS ── */
  .auth-sub   { font-size: 12.5px; color: #aaa; margin-bottom: 4px; }
  .auth-title { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 24px; }

  /* ── FIELDS ── */
  .field-group { margin-bottom: 16px; }
  .auth-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    color: #444;
    margin-bottom: 5px;
  }
  .auth-label a { font-size: 11px; color: #e8735a; text-decoration: none; }
  .auth-label a:hover { text-decoration: underline; }

  .auth-input {
    width: 100%;
    border: 1.5px solid #e2e2e2;
    border-radius: 8px;
    padding: 10px 13px;
    font-size: 13.5px;
    color: #1a1a1a;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    background: #fff;
    box-sizing: border-box;
  }
  .auth-input::placeholder { color: #bbb; }
  .auth-input:focus  { border-color: #e8735a; box-shadow: 0 0 0 3px rgba(232,115,90,.13); }
  .auth-input.is-invalid { border-color: #e53e3e !important; box-shadow: 0 0 0 3px rgba(229,62,62,.12) !important; }
  .auth-input.is-valid   { border-color: #38a169 !important; }

  .field-error { font-size: 11px; color: #e53e3e; margin-top: 3px; display: none; }
  .field-error.show { display: block; }

  /* ── BUTTON ── */
  .auth-btn {
    width: 100%;
    padding: 11px;
    background: #e8735a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: .5px;
    cursor: pointer;
    margin-top: 6px;
    transition: background .2s, transform .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .auth-btn:hover { background: #d4604a; transform: translateY(-1px); }

  .auth-footer-text {
    text-align: center;
    font-size: 12.5px;
    color: #999;
    margin-top: 22px;
  }
  .auth-footer-text a { color: #e8735a; font-weight: 600; text-decoration: none; }
  .auth-footer-text a:hover { text-decoration: underline; }

  /* ── SERVER ALERT ── */
  .server-alert {
    background: #fff3f1;
    border: 1px solid #e8735a;
    color: #c0402a;
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 12.5px;
    margin-bottom: 16px;
  }

  /* ── RIGHT PANEL ── */
  .auth-right {
    flex: 1;
    background: #fdeee9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .auth-right svg { width: 62%; max-width: 400px; height: auto; }

  @media (max-width: 800px) {
    .auth-right { display: none; }
    .auth-left  { flex: 1; max-width: 100%; padding: 40px 28px; }
  }
</style>

<div class="auth-wrap">

  <!-- LEFT: FORM -->
  <div class="auth-left">
    <div class="auth-left-inner">

      <a href="/" class="brand-name">
        <svg class="brand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" rx="16" fill="#2b2b2b"/>
          <polyline points="8,22 28,22 36,58 72,58" stroke="#c0a898" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="46" cy="74" r="9" fill="#c0a898"/>
          <circle cx="68" cy="74" r="9" fill="#c0a898"/>
          <circle cx="50" cy="26" r="11" stroke="#c0a898" stroke-width="5" fill="none"/>
          <circle cx="65" cy="38" r="11" stroke="#c0a898" stroke-width="5" fill="none"/>
          <circle cx="50" cy="50" r="11" stroke="#c0a898" stroke-width="5" fill="none"/>
        </svg>
        <span>recomart</span>
      </a>

      <p class="auth-sub">Welcome back !!!</p>
      <h1 class="auth-title">Sign in</h1>

      {% if messages %}
        {% for message in messages %}
          <div class="server-alert">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'login' %}" id="loginForm" novalidate>
        {% csrf_token %}

        <div class="field-group">
          <label class="auth-label" for="id_username">Username</label>
          <input type="text" id="id_username" name="username" class="auth-input"
                 placeholder="Enter your username" autocomplete="username"
                 value="{{ request.POST.username }}">
          <div class="field-error" id="err_username"></div>
        </div>

        <div class="field-group">
          <label class="auth-label" for="id_password">
            Password
            <a href="#">Forgot Password?</a>
          </label>
          <input type="password" id="id_password" name="password" class="auth-input"
                 placeholder="••••••••••••" autocomplete="current-password">
          <div class="field-error" id="err_password"></div>
        </div>

        <button type="submit" class="auth-btn" id="loginBtn">
          SIGN IN
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </form>

      <p class="auth-footer-text">
        I don't have an account? <a href="{% url 'register' %}">Sign up</a>
      </p>

    </div>
  </div>

  <!-- RIGHT: ILLUSTRATION -->
  <div class="auth-right">
    <svg viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="370" cy="110" r="85" fill="#f9c9bb" opacity=".5"/>
      <circle cx="95"  cy="390" r="65" fill="#f9c9bb" opacity=".38"/>
      <rect x="140" y="205" width="185" height="115" rx="14" fill="#fff" stroke="#e8735a" stroke-width="3"/>
      <rect x="156" y="222" width="62"  height="62"  rx="9"  fill="#6dd5c2"/>
      <rect x="230" y="222" width="62"  height="30"  rx="6"  fill="#f0a58a"/>
      <rect x="230" y="260" width="62"  height="18"  rx="5"  fill="#e8735a" opacity=".4"/>
      <path d="M140 226 Q106 226 100 196 Q95 166 116 156 L165 150" stroke="#e8735a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="180" cy="332" r="15" fill="#e8735a"/><circle cx="180" cy="332" r="6" fill="#fff"/>
      <circle cx="274" cy="332" r="15" fill="#e8735a"/><circle cx="274" cy="332" r="6" fill="#fff"/>
      <circle cx="344" cy="154" r="32" fill="#f0a58a"/>
      <ellipse cx="344" cy="132" rx="23" ry="15" fill="#2d2d2d"/>
      <rect x="311" y="186" width="66" height="80" rx="18" fill="#e8735a"/>
      <rect x="319" y="260" width="22" height="64" rx="11" fill="#2d2d2d"/>
      <rect x="347" y="260" width="22" height="64" rx="11" fill="#2d2d2d"/>
      <rect x="296" y="207" width="38" height="46" rx="9" fill="#fff" stroke="#e8735a" stroke-width="2"/>
      <path d="M304 207 Q304 197 315 197 Q326 197 326 207" stroke="#e8735a" stroke-width="2" fill="none"/>
      <path d="M377 200 Q394 218 381 244" stroke="#f0a58a" stroke-width="13" stroke-linecap="round" fill="none"/>
      <rect x="265" y="168" width="58" height="24" rx="12" fill="#e8735a"/>
      <text x="294" y="184" font-size="11" font-family="Arial,sans-serif" fill="#fff" text-anchor="middle" font-weight="700">SALE</text>
      <ellipse cx="108" cy="414" rx="20" ry="11" fill="#e8735a" transform="rotate(-30 108 414)"/>
      <ellipse cx="90"  cy="428" rx="13" ry="8"  fill="#f0a58a" transform="rotate(-50 90 428)"/>
      <circle cx="424" cy="362" r="5" fill="#e8735a" opacity=".45"/>
      <circle cx="440" cy="376" r="3" fill="#e8735a" opacity=".35"/>
      <circle cx="410" cy="377" r="4" fill="#e8735a" opacity=".28"/>
    </svg>
  </div>

</div>

<script>
(function(){
  var form = document.getElementById('loginForm');

  function setErr(id, msg){
    var inp = document.getElementById('id_' + id);
    var err = document.getElementById('err_' + id);
    inp.classList.add('is-invalid'); inp.classList.remove('is-valid');
    err.textContent = msg; err.classList.add('show');
  }
  function clearErr(id){
    var inp = document.getElementById('id_' + id);
    var err = document.getElementById('err_' + id);
    inp.classList.remove('is-invalid'); inp.classList.add('is-valid');
    err.classList.remove('show');
  }

  function validate(){
    var ok = true;
    var u = document.getElementById('id_username').value.trim();
    if(!u){ setErr('username','Username is required.'); ok=false; } else clearErr('username');
    var p = document.getElementById('id_password').value;
    if(!p){ setErr('password','Password is required.'); ok=false; } else clearErr('password');
    return ok;
  }

  ['id_username','id_password'].forEach(function(fid){
    document.getElementById(fid).addEventListener('input', function(){
      var key = fid.replace('id_','');
      this.classList.remove('is-invalid','is-valid');
      document.getElementById('err_'+key).classList.remove('show');
    });
  });

  form.addEventListener('submit', function(e){ if(!validate()) e.preventDefault(); });
})();
</script>

{% endblock %}
