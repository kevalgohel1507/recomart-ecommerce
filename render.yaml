databases:
  - name: recomart-db
    plan: free

services:
  - type: web
    name: recomart-ecommerce-webbb
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn --pythonpath core core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recomart-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,recomart-ecommerce-webbb.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com,https://recomart-ecommerce-webbb.onrender.com
